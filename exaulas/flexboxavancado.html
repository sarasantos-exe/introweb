<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso E-Commerce - Desafio Flexbox</title>
    <link rel="stylesheet" href="../css/flexboxavancado.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">E-Shop Moderno</div>
        <ul class="menu">
            <li>Home</li>
            <li>Produtos</li>
            <li>Promoções</li>
            <li>Contato</li>
        </ul>
        <div class="carrinho">Carrinho (0)</div>
    </header>

    <!-- Hero Banner -->
    <section class="hero-banner">
        <div class="hero-content">
            <h1>A Revolução do Flexbox</h1>
            <p>O layout mais moderno e sem hacks para suas compras.</p>
        </div>
    </section>

    <!-- Product Grid -->
    <section class="produtos-section">
        <h2 style="text-align: center; padding: 20px 0;">Nossos Produtos</h2>
        <div class="product-grid">
            <div class="product-card">Produto 1</div>
            <div class="product-card">Produto 2</div>
            <div class="product-card destaque">Produto Destaque (Promoção!)</div>
            <div class="product-card">Produto 4</div>
            <div class="product-card">Produto 5</div>
        </div>
    </section>
</body>
</html>
